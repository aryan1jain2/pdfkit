<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pdfkit-client — dev test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #0e0e0e;
      color: #f0ede6;
      min-height: 100vh;
      padding: 40px;
    }

    h1 { font-size: 1.4rem; margin-bottom: 8px; color: #e8ff47; }
    p  { font-size: 0.85rem; color: #888; margin-bottom: 32px; }

    .drop-zone {
      border: 2px dashed #333;
      border-radius: 8px;
      padding: 48px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 32px;
    }
    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: #e8ff47;
      background: #1a1a0a;
    }
    .drop-zone input { display: none; }
    .drop-zone label {
      cursor: pointer;
      font-size: 1rem;
      color: #aaa;
    }
    .drop-zone label span { color: #e8ff47; text-decoration: underline; }

    #log {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 20px;
      font-size: 0.8rem;
      line-height: 1.8;
      min-height: 120px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .log-ok   { color: #4ade80; }
    .log-err  { color: #f87171; }
    .log-info { color: #93c5fd; }
    .log-dim  { color: #555; }

    #preview {
      margin-top: 24px;
      display: none;
    }
    #preview iframe {
      width: 100%;
      height: 600px;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      background: white;
    }

    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 24px;
      background: #e8ff47;
      color: #0e0e0e;
      border: none;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

  <h1>pdfkit-client / dev test</h1>
  <p>Drop a .pptx or .xlsx file to test the conversion pipeline. Output goes to the log + PDF preview below.</p>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".pptx,.xlsx" />
    <label for="fileInput">
      Drop file here or <span>click to browse</span><br/>
      <small style="color:#555; font-size:0.75rem; margin-top:8px; display:block">Accepts .pptx · .xlsx</small>
    </label>
  </div>

  <div id="log"><span class="log-dim">// waiting for file...</span></div>

  <div id="preview">
    <button class="btn" id="downloadBtn" disabled>⬇ Download PDF</button>
    <br/><br/>
    <iframe id="pdfFrame"></iframe>
  </div>

  <script type="module" src="/dev-test.ts"></script>
</body>
</html>
